<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PinPrint Popup</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>PinPrint</h1>
    <p class="subtitle">Collect images and print them in an A4 grid.</p>

    <div class="stats">
      <span class="count" id="image-count">0</span>
      <span class="label">Images Collected</span>
    </div>

    <div class="actions">
      <button id="clear-btn" class="btn btn-secondary">Clear All</button>
      <button id="generate-btn" class="btn btn-primary">Generate Print Sheet</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
