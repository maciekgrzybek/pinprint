<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PinPrint - Your Grid</title>
  <link rel="stylesheet" href="print.css">
</head>
<body>
  <div id="controls" class="no-print">
    <h1>PinPrint Sheet Configuration</h1>
    <div class="options">
      <label>
        <input type="radio" name="gridSize" value="large" checked> Large (2x2)
      </label>
      <label>
        <input type="radio" name="gridSize" value="medium"> Medium (3x3)
      </label>
      <label>
        <input type="radio" name="gridSize" value="small"> Small (4x4)
      </label>
    </div>
    <button id="print-btn" class="btn btn-primary">Print Now</button>
  </div>

  <div id="print-container">
    <!-- Grid pages will be injected here -->
  </div>

  <script src="print.js"></script>
</body>
</html>
